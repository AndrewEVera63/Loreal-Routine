<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat Assistant</title>
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>


  <body>
    <div class="page-wrapper">
      <!------- Header / Branding ------->
      <header class="site-header">
        <img src="img/loreal-logo.png" alt="L'Oréal Logo" class="logo">
        <h1 class="site-title">Smart Routine & Product Advisor</h1>
      </header>

<p id="categoryMessage" class="category-message">
    Select a category below to view products.
</p>



<!-- Product Search & Category -->
<div class="search-section">
<input
    type="text"
    id="searchInput"
    placeholder="Search products..."
>


  
  <select id="categoryFilter">
    <option value="">All Categories</option>
    <option value="cleanser">Cleansers</option>
    <option value="moisturizer">Moisturizers</option>
    <option value="skincare">Skincare</option>
    <option value="haircare">Haircare</option>
    <option value="makeup">Makeup</option>
    <option value="hair color">Hair Color</option>
    <option value="hair styling">Hair Styling</option>
    <option value="men's grooming">Men's Grooming</option>
    <option value="suncare">Suncare</option>
    <option value="fragrance">Fragrance</option>
  </select>

</div>

<!-- Product Grid -->
<div id="productsContainer" class="products-grid"></div>

<p id="viewAllProducts" class="view-all" style="display:none;">
    View All Products
</p>

<!-- Selected Products -->
<section class="selected-products">

  <h2>Selected Products</h2>

  <div id="selectedProductsList"></div>

  <button id="generateRoutine" class="generate-btn">
      ✨ Generate Routine
  </button>

</section>




      <!------- Chat Area ------->
      <main>
        <section class="chatbox">
          <div id="chatWindow" class="chat-window">
            <!-- messages will be appended here via JS -->
          </div>

          <form id="chatForm" class="chat-form">
            <label for="userInput" class="visually-hidden">Message</label>
            <input
              id="userInput"
              name="userInput"
              type="text"
              placeholder="Ask me about L'Oréal products or routines…"
              autocomplete="off"
              required
            />
            <button type="submit" id="sendBtn">
              <span class="material-icons">send</span>
              <span class="visually-hidden">Send</span>
            </button>
          </form>
        </section>
      </main>

      <!------- Footer Links ------->
      <footer class="site-footer">
        <p>&copy; 2026 L'Oréal. All rights reserved.</p>
        <nav>
          <!-- These URLs are placeholders -->
          <a href="#">Privacy Policy</a>
          <a href="#">Terms of Use</a>
          <a href="#">Contact</a>
        </nav>
      </footer>
    </div>

    <script src="script.js"></script>
  </body>
</html>
